<mat-card>
  <mat-card-header>
    <mat-card-title>Platform — Shops</mat-card-title>
    <mat-card-subtitle>Super admin console</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    @if (loading()) {
      <mat-spinner diameter="36"></mat-spinner>
    } @else if (error()) {
      <p class="error">{{ error() }}</p>
    } @else {
      <table mat-table [dataSource]="shops()" class="shops-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let shop">{{ shop.name }}</td>
        </ng-container>

        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let shop">{{ shop.code }}</td>
        </ng-container>

        <ng-container matColumnDef="planName">
          <th mat-header-cell *matHeaderCellDef>Plan</th>
          <td mat-cell *matCellDef="let shop">{{ shop.planName }}</td>
        </ng-container>

        <ng-container matColumnDef="branchCount">
          <th mat-header-cell *matHeaderCellDef>Branches</th>
          <td mat-cell *matCellDef="let shop">{{ shop.branchCount }}</td>
        </ng-container>

        <ng-container matColumnDef="userCount">
          <th mat-header-cell *matHeaderCellDef>Users</th>
          <td mat-cell *matCellDef="let shop">{{ shop.userCount }}</td>
        </ng-container>

        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let shop">
            <mat-chip [class.active]="shop.isActive" [class.inactive]="!shop.isActive">
              {{ shop.isActive ? 'Active' : 'Suspended' }}
            </mat-chip>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
